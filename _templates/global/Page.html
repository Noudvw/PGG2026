{{ extends "otree/Page.html" }}
{{ load otree static }}

{{ block global_styles }}
<link rel="stylesheet" href="{{ static 'global/theme.css' }}">
{{ endblock }}

{{ block scripts }}
{{ super() }}
<script>
    if (typeof liveSend !== 'undefined') {
        setTimeout(() => {
            liveSend({'type': 'heartbeat'});
        }, 500);

        setInterval(() => {
            liveSend({'type': 'heartbeat'});
        }, 5000);
    }
</script>
{{ endblock }}
